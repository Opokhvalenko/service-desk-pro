name: service-desk-pro

services:
  postgres:
    image: postgres:16-alpine
    container_name: sdp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdp
      POSTGRES_PASSWORD: sdp_dev_password
      POSTGRES_DB: service_desk_pro
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sdp -d service_desk_pro']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sdp-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sdp-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP server
      - '8025:8025' # Web UI

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
