name: Seed reset

# Re-runs the idempotent Prisma seed against the production database every
# day at 03:00 UTC so the demo accounts and SLA policies are always present.
# `prisma db seed` uses upsert, so this is safe to run on a live DB.
#
# A pre-warm step pings Neon before seeding because the free-tier compute
# auto-suspends overnight, and the cold-start can exceed the default
# Prisma connect timeout when the cron fires.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Wake up Neon (handle cold start)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i: pinging Neon..."
            if npx prisma db execute --stdin <<< "SELECT 1;"; then
              echo "Neon is warm"
              exit 0
            fi
            echo "Cold start in progress, retrying in 10s..."
            sleep 10
          done
          echo "Neon did not respond after 5 attempts"
          exit 1

      - name: Run seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma db seed
