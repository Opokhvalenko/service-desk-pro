name: Seed reset

# Re-runs the idempotent Prisma seed against the production database every
# day at 03:00 UTC so the demo accounts and SLA policies are always present.
# `prisma db seed` uses upsert, so this is safe to run on a live DB.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma db seed
