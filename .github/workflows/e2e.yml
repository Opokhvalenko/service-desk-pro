name: E2E (Playwright)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: servicedesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/servicedesk?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/servicedesk?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-not-for-prod
      JWT_REFRESH_SECRET: ci-refresh-secret-not-for-prod
      ALLOW_REGISTRATION: 'true'
      CORS_ORIGIN: http://localhost:4200
      NODE_ENV: development
      PORT: '3000'
      # Cloudinary is required by env validation but smoke tests don't upload —
      # dummy values keep the bootstrap happy without hitting the real service.
      CLOUDINARY_CLOUD_NAME: ci-dummy
      CLOUDINARY_API_KEY: ci-dummy
      CLOUDINARY_API_SECRET: ci-dummy
      CLOUDINARY_UPLOAD_PRESET: ci-dummy
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: 'false'
      # Smoke tests log in as 3 different users in quick succession; default
      # auth limit (5/min) trips on retries. Bump it for CI runs only.
      AUTH_THROTTLE_LIMIT: '1000'
      REFRESH_THROTTLE_LIMIT: '1000'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ─── Backend ─────────────────────────────────────────────────────────
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate + migrate + seed
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start backend (background) and wait for health
        working-directory: backend
        run: |
          node dist/src/main.js > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          echo "Backend PID: $(cat /tmp/backend.pid)"
          ok=0
          for i in {1..60}; do
            if curl -sf http://localhost:3000/api/v1/health/live > /dev/null; then
              ok=1
              echo "Backend healthy after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Backend never became healthy. Last 200 lines of log:"
            tail -n 200 /tmp/backend.log || true
            exit 1
          fi
          curl -s http://localhost:3000/api/v1/health/ready || true

      # ─── Frontend ────────────────────────────────────────────────────────
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npm run e2e:install

      - name: Start frontend dev server (background) and wait for it
        working-directory: frontend
        run: |
          npm start -- --host 127.0.0.1 --port 4200 > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
          echo "Frontend PID: $(cat /tmp/frontend.pid)"
          ok=0
          for i in {1..120}; do
            if curl -sf http://localhost:4200 > /dev/null; then
              ok=1
              echo "Frontend up after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Frontend never came up. Last 200 lines of log:"
            tail -n 200 /tmp/frontend.log || true
            exit 1
          fi

      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Dump backend + frontend logs on failure
        if: failure()
        run: |
          echo "=== backend log ==="
          tail -n 300 /tmp/backend.log || true
          echo "=== frontend log ==="
          tail -n 300 /tmp/frontend.log || true

      - name: Stop background processes
        if: always()
        run: |
          [ -f /tmp/frontend.pid ] && kill $(cat /tmp/frontend.pid) || true
          [ -f /tmp/backend.pid ] && kill $(cat /tmp/backend.pid) || true
