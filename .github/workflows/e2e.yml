name: E2E (Playwright)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: servicedesk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/servicedesk?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/servicedesk?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-not-for-prod
      JWT_REFRESH_SECRET: ci-refresh-secret-not-for-prod
      ALLOW_REGISTRATION: 'true'
      CORS_ORIGIN: http://localhost:4200
      NODE_ENV: development
      PORT: '3000'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ─── Backend ─────────────────────────────────────────────────────────
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate + migrate + seed
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - name: Start backend
        working-directory: backend
        run: |
          npm run build
          node dist/src/main.js &
          echo $! > /tmp/backend.pid
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/v1/health/live; then break; fi
            sleep 1
          done

      # ─── Frontend ────────────────────────────────────────────────────────
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npm run e2e:install

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm start -- --host 127.0.0.1 --port 4200 &
          echo $! > /tmp/frontend.pid
          for i in {1..60}; do
            if curl -sf http://localhost:4200 > /dev/null; then break; fi
            sleep 1
          done

      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Stop background processes
        if: always()
        run: |
          [ -f /tmp/frontend.pid ] && kill $(cat /tmp/frontend.pid) || true
          [ -f /tmp/backend.pid ] && kill $(cat /tmp/backend.pid) || true
